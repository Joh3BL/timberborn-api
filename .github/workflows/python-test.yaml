name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: free port 8080
      - name: Kill any process on port 8080
        run: |
          sudo fuser -k 8080/tcp || true

      - name: Start fake Timberborn server
        run: |
          python tests/fake_server.py &
          sleep 10  # Give server enough time to bind to 8080

      - name: Run tests
        run: |
          python -m unittest discover -s tests